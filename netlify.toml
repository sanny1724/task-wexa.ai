# Netlify Build and Deploy Configuration
# Tells Netlify to build and publish the React App from the frontend sub-directory

[build]
  # The directory where Netlify will run npm install and look for package.json
  base = "frontend"

  # The directory that Netlify will serve (relative to the base directory)
  publish = "dist"

  # The command Netlify will execute to build the static assets
  command = "npm run build"

# Redirects all frontend routes to index.html for Single Page App (SPA) routing support
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
