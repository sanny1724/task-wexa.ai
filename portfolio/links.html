<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sannith Reddy | Links</title>
  <meta name="description" content="Social and professional links of Banappagari Sannith Reddy, AI/ML Developer.">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #030307;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      font-family: var(--font-sans);
      position: relative;
    }
    /* Ambient glow orb */
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(163, 54, 255, 0.12) 0%, rgba(255, 45, 85, 0.04) 50%, transparent 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .links-container {
      width: 100%;
      max-width: 440px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
      z-index: 5;
    }
    .profile-avatar-wrapper {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(163, 54, 255, 0.2);
      background-color: #07070d;
      margin-bottom: 0.5rem;
    }
    .profile-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-family: var(--font-sans);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .profile-tag {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent-cyan);
      text-shadow: 0 0 5px rgba(0, 240, 255, 0.15);
      margin-top: 4px;
    }
    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
    .link-item {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.15rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      transition: var(--transition-smooth);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      position: relative;
    }
    .link-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1px;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .link-item:hover::after {
      background: linear-gradient(135deg, var(--accent-red), var(--accent-purple), var(--accent-cyan));
    }
    .link-item:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 240, 255, 0.25);
      box-shadow: 0 10px 25px rgba(0, 240, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }
    .link-item:active {
      transform: translateY(1px);
    }
    .footer-bio {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="links-container">
    <div class="profile-avatar-wrapper">
      <img src="assets/sannith_avatar.png" alt="Sannith Reddy" class="profile-avatar" onerror="this.src='assets/sannith_hero_avatar.png'">
    </div>
    <div>
      <h1 class="profile-name">SANNITH REDDY</h1>
      <p class="profile-tag">@sanny1724</p>
    </div>
    
    <div class="links-list">
      <a href="index.html" class="link-item">PORTFOLIO</a>
      <a href="https://github.com/sanny1724" target="_blank" rel="noopener" class="link-item">GITHUB</a>
      <a href="https://linkedin.com/in/sannithreddy17" target="_blank" rel="noopener" class="link-item">LINKEDIN</a>
      <a href="mailto:Sravssunny15@gmail.com" class="link-item">EMAIL ME</a>
      <a href="tel:+918520997360" class="link-item">CALL ME</a>
    </div>

    <p class="footer-bio">B.Tech CSE (AI & ML) | SPEC</p>
  </div>
</body>
</html>
