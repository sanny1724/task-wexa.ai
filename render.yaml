# render.yaml
services:
  # StockFlow Express Backend API Service
  - type: web
    name: stockflow-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && npm start
    cwd: backend
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://stockflow-mvp.netlify.app # Replace with your actual Netlify frontend URL
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString

databases:
  # StockFlow PostgreSQL Database
  - name: stockflow-db
    plan: free
